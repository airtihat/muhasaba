<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ربط مع أنظمة الفوترة</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background-color: #f9f9f9;
      color: #333;
      padding: 20px;
    }

    h1 {
      text-align: center;
      margin-bottom: 30px;
    }

    .integration-form {
      background: #fff;
      max-width: 800px;
      margin: auto;
      padding: 25px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.05);
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-weight: bold;
    }

    input, select {
      width: 100%;
      padding: 10px;
      font-size: 16px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    .actions {
      text-align: center;
      margin-top: 20px;
    }

    button {
      padding: 12px 25px;
      font-size: 16px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      background-color: #0077cc;
      color: white;
    }

    button:hover {
      background-color: #005fa3;
    }

    .sync-log {
      margin-top: 50px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      box-shadow: 0 0 5px rgba(0,0,0,0.03);
    }

    th, td {
      padding: 12px;
      text-align: center;
      border-bottom: 1px solid #eee;
    }

    thead {
      background-color: #0077cc;
      color: white;
    }

    .status-success {
      color: green;
      font-weight: bold;
    }

    .status-failed {
      color: red;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <h1>إعدادات الربط مع أنظمة الفوترة</h1>

  <form class="integration-form">
    <div class="form-group">
      <label>اختيار نظام الفوترة</label>
      <select required>
        <option value="">-- اختر النظام --</option>
        <option value="fatoorah">فاتورة</option>
        <option value="zoho">Zoho Invoice</option>
        <option value="internal">نظام داخلي</option>
        <option value="custom">نظام مخصص</option>
      </select>
    </div>

    <div class="form-group">
      <label>API Key</label>
      <input type="text" placeholder="أدخل مفتاح API المقدم من مزود الخدمة" required />
    </div>

    <div class="form-group">
      <label>رابط الربط (API Endpoint)</label>
      <input type="url" placeholder="https://api.example.com/v1/invoice" required />
    </div>

    <div class="actions">
      <button type="submit">حفظ الإعدادات</button>
      <button type="button" style="background-color:#28a745; margin-right: 10px;">اختبار الاتصال</button>
    </div>
  </form>

  <div class="sync-log">
    <h2 style="text-align: center; margin: 40px 0 20px;">سجل عمليات الربط</h2>
    <table>
      <thead>
        <tr>
          <th>التاريخ</th>
          <th>نوع العملية</th>
          <th>الوصف</th>
          <th>الحالة</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>2025-06-15</td>
          <td>إرسال فاتورة</td>
          <td>فاتورة رقم #1023</td>
          <td class="status-success">تم</td>
        </tr>
        <tr>
          <td>2025-06-14</td>
          <td>استيراد حالة</td>
          <td>تحديث حالة السداد</td>
          <td class="status-failed">فشل</td>
        </tr>
      </tbody>
    </table>

    <div class="actions" style="margin-top: 20px;">
      <button type="button" style="background-color:#17a2b8;">مزامنة الآن</button>
    </div>
  </div>

</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>إتمام الاشتراك | شركة المحاسبة السحابية</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background-color: #f9f9f9;
      color: #333;
    }

    header, footer {
      background-color: #000;
      color: white;
      text-align: center;
      padding: 20px 0;
    }

    main.payment-section {
      max-width: 600px;
      margin: 40px auto;
      background: white;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 0 15px rgba(0,0,0,0.05);
    }

    main.payment-section h1 {
      font-size: 24px;
      margin-bottom: 10px;
    }

    main.payment-section p {
      color: #666;
      margin-bottom: 30px;
    }

    form.payment-form {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    label {
      font-weight: bold;
      margin-bottom: 5px;
    }

    input, select {
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 16px;
      width: 100%;
    }

    .btn {
      background-color: #0077cc;
      color: white;
      border: none;
      padding: 14px;
      font-size: 18px;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.3s ease;
    }

    .btn:hover {
      background-color: #005fa3;
    }

    @media (max-width: 600px) {
      main.payment-section {
        margin: 20px 10px;
        padding: 20px;
      }
    }
  </style>
</head>
<body>

  <header>
    <h2>شركة المحاسبة السحابية</h2>
    <nav>
      <a href="#" style="color:white; margin:0 10px;">الرئيسية</a>
      <a href="#" style="color:white; margin:0 10px;">الاشتراك</a>
      <a href="#" style="color:white; margin:0 10px;">الدعم</a>
    </nav>
  </header>

  <main class="payment-section">
    <h1>إتمام الاشتراك</h1>
    <p>الرجاء تعبئة البيانات أدناه لإكمال الدفع.</p>

    <form class="payment-form" method="POST" action="submit-payment.php">
      <label for="name">اسمك الكامل</label>
      <input type="text" id="name" name="name" placeholder="الاسم الكامل" required>

      <label for="email">البريد الإلكتروني</label>
      <input type="email" id="email" name="email" placeholder="example@email.com" required>

      <label for="plan">اختر الباقة</label>
      <select name="plan" id="plan" required>
        <option value="">-- اختر --</option>
        <option value="الأساسية">الباقة الأساسية - 99 ريال</option>
        <option value="المتقدمة">الباقة المتقدمة - 249 ريال</option>
        <option value="الشركات">باقة الشركات - 599 ريال</option>
      </select>

      <label for="card">رقم البطاقة</label>
      <input type="text" id="card" name="card" maxlength="19" placeholder="0000 0000 0000 0000" required>

      <label for="expiry">تاريخ الانتهاء</label>
      <input type="month" id="expiry" name="expiry" required>

      <label for="cvv">رمز الأمان (CVV)</label>
      <input type="password" id="cvv" name="cvv" maxlength="3" required>

      <button class="btn" type="submit">ادفع الآن</button>
    </form>
  </main>

  <footer>
    <p>© 2025 شركة المحاسبة السحابية - جميع الحقوق محفوظة</p>
    <a href="#" style="color:white; margin:0 10px;">الخصوصية</a> |
    <a href="#" style="color:white; margin:0 10px;">الشروط والأحكام</a>
  </footer>

</body>
</html>

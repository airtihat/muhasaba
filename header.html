<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام محاسبة المقاولات</title>
    <style>
        /* تنسيق الشريط العلوي header */
        header {
            background-color: #333;
            color: white;
            padding: 20px;
            text-align: center;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header .logo img {
            width: 50px;
            height: auto;
        }

        header h1 {
            font-size: 28px;
            flex-grow: 1;
        }

        header nav {
            margin-left: 20px;
        }

        header nav ul {
            list-style-type: none;
            display: flex;
            padding: 0;
        }

        header nav ul li {
            margin-right: 20px;
        }

        header nav ul li a {
            color: white;
            text-decoration: none;
            font-size: 18px;
        }

        header nav ul li a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<!-- الشريط العلوي -->
<header>
    <div class="logo">
        <!-- تأكد من وضع الشعار في المسار الصحيح -->
        <img src="logo.png" alt="شعار النظام">
    </div>
    <h1>نظام محاسبة المقاولات</h1>
    <nav>
        <ul>
            <li><a href="#home">الرئيسية</a></li>
            <li><a href="#about">حول</a></li>
            <li><a href="#contact">اتصل بنا</a></li>
        </ul>
    </nav>
</header>

</body>
</html>
